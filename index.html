<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilos base del banner */
        .promo-banner {
            width: 100%;
            padding: 20px 0 40px 0;
            display: flex;
            justify-content: center;
        }

        /* Contenedor con proporción 2:1 */
        .video-container {
            width: 95%;
            max-width: 1200px;
            aspect-ratio: 2 / 1;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        /* El video ocupa todo el contenedor */
        #promoVideoEl {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recorta ligeramente para llenar el área sin deformar */
            display: block;
        }

        /* Responsividad para pantallas pequeñas */
        @media (max-width: 768px) {
            .video-container {
                aspect-ratio: 16 / 9; /* Más cómodo para móviles */
                width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<section class="promo-banner">
    <div class="video-container">
        <!-- Atributos esenciales para asegurar el autoplay en navegadores modernos -->
        <video id="promoVideoEl" controls autoplay muted loop playsinline></video>
    </div>
</section>

<!-- Librería necesaria para que el .m3u8 funcione en Chrome/Edge/Firefox -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    (function() {
        var video = document.getElementById('promoVideoEl');
        var videoSrc = 'https://slimages.macysassets.com/is/content/MacysInc/1768221369347-AVS.m3u8?packagedStreaming=true';

        // Función de seguridad para iniciar reproducción
        function forcePlay() {
            var promise = video.play();
            if (promise !== undefined) {
                promise.catch(function(error) {
                    console.warn("Autoplay bloqueado. El usuario debe activar el audio o interactuar.");
                });
            }
        }

        if (Hls.isSupported()) {
            var hls = new Hls({
                // Mejora el rendimiento limitando la calidad al tamaño real del video
                capLevelToPlayerSize: true 
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                forcePlay();
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Soporte directo para Safari (macOS e iOS)
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                forcePlay();
            });
        }
    })();
</script>

</body>
</html>
